  #   networks:
  #     - internal
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # ─── DB MIGRATIONS (runs once on startup) ────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate                      # use migrate stage with src files
    container_name: bh_migrate
    command: bun run db:migrate
    environment:
      DATABASE_URL: postgresql://bh_user:${POSTGRES_PASSWORD}@postgres:5432/boutique_hotels
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"                          # run once and exit

