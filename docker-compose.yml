# ─────────────────────────────────────────────────────────────────────────────
# P09 · Boutique Hotels — Docker Compose
# Runtime: BUN · Framework: Next.js 15 · DB: PostgreSQL 16 · Cache: Redis 7
# ─────────────────────────────────────────────────────────────────────────────

name: boutique-hotels

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ─── APPLICATION ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner               # multistage: use production layer
      args:
        BUN_VERSION: "1.1.34"
    image: boutique-hotels/app:local
    container_name: bh_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # ── Database
      DATABASE_URL: postgresql://bh_user:${POSTGRES_PASSWORD}@postgres:5432/boutique_hotels
      # ── Redis
      REDIS_URL: redis://redis:6379
      # ── Auth / JWT  (ES256 key pair — generate with: openssl ecparam -genkey -name prime256v1 | openssl pkcs8 -topk8 -nocrypt)
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ALGORITHM: ES256
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      # ── SSO / OIDC
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      # ── OTP (TOTP)
      OTP_ISSUER: BoutiqueHotels
      OTP_ALGORITHM: SHA1
      OTP_DIGITS: "6"
      OTP_PERIOD: "30"
      OTP_PEPPER: ${OTP_PEPPER}            # additional HMAC pepper for stored secrets
      # ── i18n
      DEFAULT_LOCALE: es
      SUPPORTED_LOCALES: es,en
      # ── Storage (MinIO in dev, real S3 in prod)
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: boutique-hotels-media
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-bh_minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"          # required for MinIO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── POSTGRESQL 16 ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boutique_hotels
      POSTGRES_USER: bh_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro   # extensions: uuid-ossp, pg_trgm
    ports:
      - "5433:5432"                        # expose only in dev; remove in production
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bh_user -d boutique_hotels"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── REDIS 7 ───────────────────────────────────────────────────────────────
