# ─────────────────────────────────────────────────────────────────────────────
# P09 · Boutique Hotels — Docker Compose
# Runtime: BUN · Framework: Next.js 15 · DB: PostgreSQL 16 · Cache: Redis 7
# ─────────────────────────────────────────────────────────────────────────────

name: boutique-hotels

networks:
  internal:
    driver: bridge
  public:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

services:
  # ─── APPLICATION ─────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        BUN_VERSION: "1.1.34"
    image: boutique-hotels/app:local
    container_name: bh_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://bh_user:${POSTGRES_PASSWORD}@postgres:5432/boutique_hotels
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      JWT_ALGORITHM: ES256
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      OTP_ISSUER: BoutiqueHotels
      OTP_ALGORITHM: SHA1
      OTP_DIGITS: "6"
      OTP_PERIOD: "30"
      OTP_PEPPER: ${OTP_PEPPER}
      DEFAULT_LOCALE: es
      SUPPORTED_LOCALES: es,en
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: boutique-hotels-media
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-bh_minio}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:                          # FIX: app ahora espera a que Redis esté listo
        condition: service_healthy
    networks:
      - internal
      - public
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── POSTGRESQL 16 ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: bh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: boutique_hotels
      POSTGRES_USER: bh_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    ports:
      - "5433:5432"
    # FIX: Configuración de performance para PostgreSQL
    command: >
      postgres
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c wal_buffers=16MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bh_user -d boutique_hotels"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── REDIS 7 ─────────────────────────────────────────────────────────────
  # FIX: Redis estaba comentado pero la app lo intentaba conectar en cada
  # request, causando timeouts y reintentos que bloqueaban toda la app.
  redis:
    image: redis:7-alpine
    container_name: bh_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
      --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MINIO (S3-compatible, for dev) ──────────────────────────────────────
  # minio:
  #   image: minio/minio:latest
  #   ...

  # ─── DB MIGRATIONS (runs once on startup) ────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: bh_migrate
    command: bun run db:migrate
    environment:
      DATABASE_URL: postgresql://bh_user:${POSTGRES_PASSWORD}@postgres:5432/boutique_hotels
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"
